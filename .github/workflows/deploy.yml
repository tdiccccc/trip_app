name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev

      # ---------- Backend ----------
      - name: Build backend image
        run: |
          docker build \
            -t asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trip/backend:${{ github.sha }} \
            -t asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trip/backend:latest \
            -f backend/Dockerfile \
            backend/

      - name: Push backend image
        run: |
          docker push asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trip/backend:${{ github.sha }}
          docker push asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trip/backend:latest

      - name: Deploy backend to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: trip-app-backend
          region: asia-northeast1
          image: asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trip/backend:${{ github.sha }}
          flags: |
            --min-instances=0
            --max-instances=1
            --memory=512Mi
            --cpu=1
            --allow-unauthenticated
            --set-env-vars=^@^APP_ENV=production@APP_KEY=${{ secrets.APP_KEY }}@APP_DEBUG=false@APP_URL=${{ secrets.FRONTEND_URL }}@LOG_CHANNEL=stderr@DB_CONNECTION=sqlite@SESSION_DRIVER=database@LITESTREAM_REPLICA_BUCKET=${{ secrets.LITESTREAM_REPLICA_BUCKET }}@FRONTEND_URL=${{ secrets.FRONTEND_URL }}@SANCTUM_STATEFUL_DOMAINS=${{ secrets.SANCTUM_STATEFUL_DOMAINS }}@SESSION_SECURE_COOKIE=true

      # バックエンドのURLを取得（フロントエンドのプロキシ先として使用）
      - name: Get backend URL
        id: backend-url
        run: echo "url=${{ steps.deploy-backend.outputs.url }}" >> "$GITHUB_OUTPUT"

      # ---------- Frontend ----------
      - name: Build frontend image
        run: |
          docker build \
            --build-arg NUXT_API_BASE_URL=${{ steps.backend-url.outputs.url }} \
            -t asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trip/frontend:${{ github.sha }} \
            -t asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trip/frontend:latest \
            -f frontend/Dockerfile \
            frontend/

      - name: Push frontend image
        run: |
          docker push asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trip/frontend:${{ github.sha }}
          docker push asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trip/frontend:latest

      - name: Deploy frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: trip-app-frontend
          region: asia-northeast1
          image: asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trip/frontend:${{ github.sha }}
          flags: |
            --min-instances=0
            --max-instances=1
            --memory=256Mi
            --cpu=1
            --allow-unauthenticated
            --set-env-vars=NODE_ENV=production,NUXT_API_BASE_URL=${{ steps.backend-url.outputs.url }}
